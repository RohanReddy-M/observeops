# ─── Loki Configuration ───────────────────────────────────────────────────────
# Loki is a log aggregation system. It stores logs indexed by labels.
# Unlike ELK which indexes the full log content (expensive),
# Loki only indexes labels (cheap) and stores the log content compressed.
# This makes it much cheaper to run at scale.

auth_enabled: false    # No authentication for our dev setup

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# ─── Schema Configuration ─────────────────────────────────────────────────────
# Defines how Loki stores and indexes log data over time
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h    # Create a new index file every 24 hours

# ─── Storage Configuration ────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# ─── Retention ────────────────────────────────────────────────────────────────
# Delete logs older than 30 days to manage disk space
# In production, retention is a cost/compliance decision
limits_config:
  retention_period: 30d
  
compactor:
  working_directory: /loki/retention
  retention_enabled: true
  delete_request_store: filesystem
