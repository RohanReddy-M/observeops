# ─── Nginx Configuration ──────────────────────────────────────────────────────
# Nginx is a reverse proxy - it sits in front of your services and routes
# traffic based on URL path. 
#
# Without Nginx: clients need to know port 8001 for secureship, 8002 for statusservice
# With Nginx: clients hit port 80 (or 443 for HTTPS), Nginx routes internally
#
# This is important because:
# 1. You never expose raw application ports to the internet in production
# 2. Nginx handles SSL termination (HTTPS), compression, and caching
# 3. It's the pattern the ALB replicates at the AWS level

# Number of worker processes. "auto" = one per CPU core.
worker_processes auto;

events {
    # Maximum simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ─── Upstream Definitions ─────────────────────────────────────────────────
    # "upstream" defines a group of backend servers.
    # Nginx load balances across servers in a group (round-robin by default).
    # In our case each upstream has one server (the container name).
    # Docker DNS resolves "secureship" to the container's IP automatically.

    upstream secureship_backend {
        # Format: server <host>:<port>
        # "secureship" resolves via Docker's internal DNS
        server secureship:8001;
        
        # keepalive: maintain persistent connections to the backend
        # Reduces connection overhead for high-traffic services
        keepalive 32;
    }

    upstream statusservice_backend {
        server statusservice:8002;
        keepalive 32;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 32;
    }

    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 32;
    }

    # ─── Logging Format ───────────────────────────────────────────────────────
    # JSON access logs so Promtail/Loki can parse them
    log_format json_combined escape=json
        '{'
            '"time":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ─── Server Block ─────────────────────────────────────────────────────────
    # A "server" block handles requests for a specific host/port combination
    server {
        # Listen on port 80 (HTTP)
        listen 80;
        
        # Accept requests for any hostname
        # In production, replace with your actual domain: secureship.click
        server_name _;

        # ─── Health Check for Load Balancer ───────────────────────────────────
        # ALB will hit /nginx-health to check if Nginx itself is alive
        location /nginx-health {
            access_log off;    # Don't log health check spam
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ─── SecureShip Routes ────────────────────────────────────────────────
        # All requests starting with /api/ go to SecureShip
        location /api/ {
            proxy_pass http://secureship_backend;
            
            # Pass the real client IP to the backend
            # Without this, your app only sees Nginx's IP, not the real client
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            
            # Timeout settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # SecureShip health and metrics (direct access)
        location ~ ^/(health|metrics)$ {
            proxy_pass http://secureship_backend;
            proxy_set_header Host $http_host;
        }

        # ─── StatusService Routes ─────────────────────────────────────────────
        location /status/ {
            proxy_pass http://statusservice_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
        }

        location /load {
            proxy_pass http://statusservice_backend;
            proxy_set_header Host $http_host;
            # Load endpoint takes longer - increase timeout
            proxy_read_timeout 150s;
        }

        location /fail {
            proxy_pass http://statusservice_backend;
            proxy_set_header Host $http_host;
        }

        # ─── Grafana ──────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana_backend/;
            proxy_set_header Host $http_host;
            # WebSocket support for Grafana live features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ─── Prometheus ───────────────────────────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus_backend/;
            proxy_set_header Host $http_host;
        }

        # ─── Root ─────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://secureship_backend;
            proxy_set_header Host $http_host;
        }
    }
}
